<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stoke:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="loja.css">
    <script defer src="lojaComDom.js"></script>
</head>
<body>
    <main>
        <div id="catalogo" class="catalogo-box"></div>
        <section class="modificacao">
            <h1>Modificar produto</h1>
            <form>
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome">
                <label for="preco">Preço</label>
                <input type="number" id="preco" name="preco">
                <label for="estoque">Estoque</label>
                <input type="number" id="estoque" name="estoque">
                <button type="submit" id="btn-salvar" onclick="adicionarProduto(event)">Salvar</button>
                <button type="submit" id="lista">Editar</button>
                <button type="button" id="btn-remover" onclick="removerProduto(event)">Remover</button>
                <button type="button" id="btn-limpar" onclick="limparFormulario(event)">Limpar</button>
            </form>
        </section>
    </main>
</body>
</html>
